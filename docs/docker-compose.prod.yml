version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: english_learning_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: english_learning
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - english_learning_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: english-learning-backend:latest
    container_name: english_learning_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/english_learning
      - SECRET_KEY=${SECRET_KEY}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET}
      - ALIYUN_OSS_ENDPOINT=${ALIYUN_OSS_ENDPOINT}
      - ALIYUN_OSS_BUCKET_NAME=${ALIYUN_OSS_BUCKET_NAME}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - XUNFEI_APP_ID=${XUNFEI_APP_ID}
      - XUNFEI_API_KEY=${XUNFEI_API_KEY}
      - XUNFEI_API_SECRET=${XUNFEI_API_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./data/materials:/app/data/materials
    networks:
      - english_learning_network

  frontend:
    image: english-learning-frontend:latest
    container_name: english_learning_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - english_learning_network

volumes:
  mysql_data:

networks:
  english_learning_network:
    driver: bridge
