<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 移动端 viewport: 允许用户缩放 (无障碍), 适配 iOS safe-area -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Linyu">
  <meta name="theme-color" content="#0F4C3A">

  <!-- 字体: 用 display=swap 避免首屏白屏 (移动端慢速网络) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  >
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  </noscript>

  <title>Linyu — 英语口语学习</title>
  <style>
    /* 防止页面加载时闪烁 */
    html, body {
      margin: 0;
      padding: 0;
      background: #FAFAF7;
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    /* 全局允许文本选区 (避免跟 Learn.vue 选区冲突, 之前是 user-select: none) */
    html, body {
      -webkit-touch-callout: none;
    }
    /* 输入框保留可编辑 */
    input, textarea, [contenteditable] {
      -webkit-user-select: text;
      user-select: text;
    }
    /* 移动端 smooth scroll */
    @media (max-width: 768px) {
      html { scroll-behavior: smooth; }
      body { -webkit-tap-highlight-color: transparent; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
