version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: english_learning_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: english_learning
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - english_learning_network

  backend:
    image: english-learning-backend:latest
    container_name: english_learning_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-root123456}@mysql:3306/english_learning
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID:-}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      - ALIYUN_OSS_ENDPOINT=${ALIYUN_OSS_ENDPOINT:-}
      - ALIYUN_OSS_BUCKET_NAME=${ALIYUN_OSS_BUCKET_NAME:-}
      - ALIYUN_OSS_URL_EXPIRE=${ALIYUN_OSS_URL_EXPIRE:-3600}
      - CDN_DOMAIN=${CDN_DOMAIN:-}
      - VIDEO_BASE_URL=${VIDEO_BASE_URL:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - XUNFEI_APP_ID=${XUNFEI_APP_ID:-}
      - XUNFEI_API_KEY=${XUNFEI_API_KEY:-}
      - XUNFEI_API_SECRET=${XUNFEI_API_SECRET:-}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./data/materials:/app/data/materials
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - english_learning_network

  frontend:
    image: english-learning-frontend:latest
    container_name: english_learning_frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - english_learning_network

  nginx:
    image: nginx:alpine
    container_name: english_learning_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - english_learning_network

volumes:
  mysql_data:

networks:
  english_learning_network:
    driver: bridge