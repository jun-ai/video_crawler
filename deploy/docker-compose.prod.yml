version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: english_learning_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: english_learning
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - english_learning_network

  backend:
    image: english-learning-backend:latest
    container_name: english_learning_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/english_learning
      - DEBUG=false
      - VIDEO_BASE_URL=
    volumes:
      - ./data/materials:/app/data/materials
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - mysql
    networks:
      - english_learning_network

  frontend:
    image: english-learning-frontend:latest
    container_name: english_learning_frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - english_learning_network

  nginx:
    image: nginx:alpine
    container_name: english_learning_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - english_learning_network

volumes:
  mysql_data:

networks:
  english_learning_network:
    driver: bridge